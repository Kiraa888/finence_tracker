<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceOS | Premium Tracker</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>

    <style>
        /* ==========================================================================
           1. THEME VARIABLES & BASE
           ========================================================================== */
        :root[data-theme="light"] {
            --bg-base: #eef2f5;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --card-solid: #ffffff;
            --border-light: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --blob-1: #c7d2fe;
            --blob-2: #fde68a;
        }

        :root[data-theme="dark"] {
            --bg-base: #020617;
            --glass-bg: rgba(15, 23, 42, 0.4);
            --card-solid: #1e293b;
            --border-light: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #34d399;
            --danger: #f87171;
            --warning: #fbbf24;
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --blob-1: #3730a3;
            --blob-2: #991b1b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

        body {
            background-color: var(--bg-base); color: var(--text-main);
            min-height: 100vh; padding: 2rem 1rem; position: relative;
            overflow-x: hidden; transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* ==========================================================================
           2. BACKGROUND EFFECTS (GLASSMORPHISM)
           ========================================================================== */
        .background-blobs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.6; animation: float 10s infinite ease-in-out alternate; }
        .blob-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: var(--blob-1); }
        .blob-2 { bottom: -10%; right: -10%; width: 400px; height: 400px; background: var(--blob-2); animation-delay: -5s; }

        @keyframes float { 100% { transform: translateY(50px) scale(1.1); } }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 2rem;
        }

        /* ==========================================================================
           3. UTILITIES & TYPOGRAPHY
           ========================================================================== */
        .app-container { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }
        .text-success { color: var(--success); } .text-danger { color: var(--danger); } .text-muted { color: var(--text-muted); }
        .mt-2 { margin-top: 0.5rem; } .mt-4 { margin-top: 1.5rem; } .mb-4 { margin-bottom: 1rem; } .hidden { display: none !important; }

        /* ==========================================================================
           4. HEADER & ROUTING NAVIGATION
           ========================================================================== */
        header.top-nav { display: flex; justify-content: space-between; align-items: center; padding-bottom: 1.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-light); }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-size: 1.2rem; color: var(--primary); }

        .view-tabs { display: flex; gap: 0.5rem; background: var(--border-light); padding: 0.25rem; border-radius: 12px; }
        .tab-btn { padding: 0.5rem 1.5rem; border: none; background: transparent; color: var(--text-muted); border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .tab-btn.active { background: var(--card-solid); color: var(--primary); box-shadow: var(--card-shadow); }

        .nav-actions { display: flex; align-items: center; gap: 1rem; }
        .header-select { padding: 0.6rem 1rem; border-radius: 8px; border: 1px solid var(--border-light); background: var(--card-solid); color: var(--text-main); font-weight: 600; cursor: pointer; }

        .portfolio-badge {
            background: linear-gradient(135deg, var(--primary), #8b5cf6); color: white; padding: 0.5rem 1rem; border-radius: 20px;
            text-decoration: none; font-weight: 600; font-size: 0.85rem; display: inline-flex; align-items: center; transition: transform 0.2s, box-shadow 0.2s;
        }
        .portfolio-badge:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4); }

        /* ==========================================================================
           5. LAYOUT GRIDS & CARDS
           ========================================================================== */
        .view-container { display: none; opacity: 0; transition: opacity 0.3s ease; }
        .view-container.active { display: block; opacity: 1; animation: fadeIn 0.4s ease; }

        .summary-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
        .main-content-grid { display: grid; grid-template-columns: 350px 1fr; gap: 1.5rem; align-items: start; }
        .analytics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem; }
        .left-panel, .right-panel { display: flex; flex-direction: column; gap: 1.5rem; }

        .solid-card { background: var(--card-solid); border: 1px solid var(--border-light); border-radius: 16px; padding: 1.5rem; box-shadow: var(--card-shadow); transition: transform 0.2s, box-shadow 0.2s; }
        .solid-card:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.08); }

        .gradient-primary { background: linear-gradient(135deg, var(--primary), #8b5cf6); color: white; border: none; }
        .gradient-primary h2, .gradient-primary h3, .gradient-primary .card-icon { color: white; }
        .stat-card { display: flex; align-items: center; gap: 1rem; }
        .card-icon { font-size: 2rem; padding: 1rem; background: rgba(0,0,0,0.05); border-radius: 12px; }

        /* ==========================================================================
           6. FORMS & INPUTS
           ========================================================================== */
        .form-row { display: flex; gap: 1rem; } .form-row .form-group { flex: 1; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
        .form-group input, .form-group select { width: 100%; padding: 0.8rem; border: 1px solid var(--border-light); border-radius: 8px; background: var(--bg-base); color: var(--text-main); transition: border-color 0.2s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }

        .btn { padding: 0.8rem 1.5rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-secondary { background: var(--border-light); color: var(--text-main); }
        .btn-secondary:hover { filter: brightness(0.9); }
        .btn-icon { background: none; font-size: 1.5rem; padding: 0.5rem; border: none; cursor: pointer; }
        .form-actions { display: flex; gap: 1rem; margin-top: 1rem; }

        /* ==========================================================================
           7. LISTS, TRANSACTIONS & BUDGETS
           ========================================================================== */
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .search-box { position: relative; width: 200px; }
        .search-box i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-box input { padding-left: 2rem; width: 100%; border-radius: 20px; border: 1px solid var(--border-light); padding-top: 0.5rem; padding-bottom: 0.5rem; background: transparent; color: var(--text-main); }

        .transaction-list { list-style: none; max-height: 500px; overflow-y: auto; padding-right: 0.5rem; }
        .transaction-list::-webkit-scrollbar { width: 6px; } .transaction-list::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 10px; }

        .transaction-item { background: var(--bg-base); border-radius: 12px; padding: 1rem 1.2rem; margin-bottom: 0.75rem; display: flex; align-items: center; justify-content: space-between; }
        .trans-left { display: flex; align-items: center; gap: 1rem; }
        .cat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .trans-details strong { font-size: 1rem; display: block; } .trans-meta { font-size: 0.8rem; color: var(--text-muted); }
        .trans-right { display: flex; align-items: center; gap: 1rem; } .trans-amount { font-weight: bold; font-size: 1.1rem; }

        .action-btn { background: none; border: none; padding: 0.4rem; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        .delete-btn { color: var(--danger); opacity: 0; transition: opacity 0.2s ease; }
        .transaction-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { background: rgba(239, 68, 68, 0.1); }

        .budget-item { margin-bottom: 1rem; }
        .budget-info { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.4rem; }
        .budget-bar-bg { background: var(--bg-base); height: 8px; border-radius: 4px; overflow: hidden; }
        .budget-bar-fill { height: 100%; background: var(--primary); transition: width 0.3s ease; }
        .budget-bar-fill.warning { background: var(--warning); } .budget-bar-fill.danger { background: var(--danger); }

        /* ==========================================================================
           8. OVERLAYS: MODALS, TOASTS & LOADERS
           ========================================================================== */
        .app-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-base); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        .app-loader p { margin-top: 1rem; color: var(--text-muted); font-weight: 600; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border-light); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }

        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: var(--card-solid); color: var(--text-main); padding: 1rem 1.5rem; border-radius: 8px; border-left: 4px solid var(--primary); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2); animation: slideIn 0.3s ease forwards; pointer-events: auto; display: flex; align-items: center; gap: 10px; transition: opacity 0.3s ease; }
        .toast.error { border-left-color: var(--danger); }
        .toast-action { background: rgba(0,0,0,0.05); border: none; color: inherit; padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; font-weight: bold; margin-left: 1rem; font-size: 0.8rem; transition: background 0.2s; }
        .toast-action:hover { background: rgba(0,0,0,0.1); }
        :root[data-theme="dark"] .toast-action { background: rgba(255,255,255,0.1); }
        :root[data-theme="dark"] .toast-action:hover { background: rgba(255,255,255,0.2); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 10000; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        .modal-overlay.active, .modal-overlay.visible { opacity: 1; pointer-events: auto; }
        .modal-content { width: 400px; max-width: 90%; transform: scale(0.95); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal-overlay.active .modal-content, .modal-overlay.visible .modal-content { transform: scale(1); }
        .modal-actions { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem; }

        /* ==========================================================================
           9. ANIMATIONS
           ========================================================================== */
        .animate-group { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .list-enter { animation: slideLeft 0.3s cubic-bezier(0.16, 1, 0.3, 1) both; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideLeft { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ==========================================================================
           10. RESPONSIVE DESIGN
           ========================================================================== */
        @media (max-width: 900px) {
            .main-content-grid { grid-template-columns: 1fr; }
            .analytics-grid { grid-template-columns: 1fr; }
            header.top-nav { flex-direction: column; gap: 1rem; align-items: flex-start; }
            .nav-actions { width: 100%; flex-wrap: wrap; justify-content: space-between; }
            .history-header { flex-direction: column; align-items: stretch; gap: 1rem; }
            .search-box { width: 100%; }
        }
    </style>
</head>
<body>
    <div id="app-loader" class="app-loader">
        <div class="spinner"></div>
        <p>Loading FinanceOS...</p>
    </div>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container glass-panel" id="app-root" style="opacity: 0;">
        <header class="top-nav">
            <div class="logo">
                <i class="fa-solid fa-layer-group"></i>
                <h1>FinanceOS</h1>
            </div>
            
            <nav class="view-tabs" role="tablist">
                <button class="tab-btn active" data-target="dashboard-view" role="tab">Dashboard</button>
                <button class="tab-btn" data-target="analytics-view" role="tab">Analytics</button>
            </nav>

            <div class="nav-actions">
                <select id="global-date-filter" class="header-select">
                    <option value="all">All Time</option>
                    <option value="month" selected>This Month</option>
                </select>
                <button id="open-export-btn" class="btn btn-secondary" aria-label="Export"><i class="fa-solid fa-download"></i></button>
                <button id="theme-toggle" class="btn btn-icon" aria-label="Toggle Theme">🌓</button>
                <a href="https://kiraa888.github.io/animesh-portfolio/" target="_blank" class="portfolio-badge">
                    <span>By Animesh</span>
                </a>
            </div>
        </header>

        <main class="main-content">
            <div id="dashboard-view" class="view-container active" role="tabpanel">
                <section class="summary-section animate-group">
                    <div class="card solid-card balance-card gradient-primary">
                        <div class="card-icon"><i class="fa-solid fa-building-columns"></i></div>
                        <div><h3>Net Balance</h3><h2 id="balance-amount">₹0.00</h2></div>
                    </div>
                    <div class="card solid-card stat-card">
                        <div class="card-icon text-success"><i class="fa-solid fa-arrow-trend-up"></i></div>
                        <div><h3>Income</h3><h2 id="income-amount">₹0.00</h2></div>
                    </div>
                    <div class="card solid-card stat-card">
                        <div class="card-icon text-danger"><i class="fa-solid fa-arrow-trend-down"></i></div>
                        <div><h3>Expenses</h3><h2 id="expense-amount">₹0.00</h2></div>
                    </div>
                </section>

                <div class="main-content-grid mt-4">
                    <aside class="left-panel">
                        <section class="card solid-card form-section animate-group">
                            <h3 id="form-title">New Transaction</h3>
                            <form id="transaction-form">
                                <input type="hidden" id="edit-id" value="">
                                <div class="form-row">
                                    <div class="form-group"><label>Type</label><select id="type" required><option value="expense">Expense</option><option value="income">Income</option></select></div>
                                    <div class="form-group"><label>Category</label><select id="category" required></select></div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group"><label>Amount (₹)</label><input type="number" id="amount" step="0.01" min="0.01" required></div>
                                    <div class="form-group"><label>Date</label><input type="date" id="date" required></div>
                                </div>
                                <div class="form-group"><label>Description</label><input type="text" id="desc" required></div>
                                <div class="form-actions">
                                    <button type="submit" class="btn btn-primary">Save</button>
                                </div>
                            </form>
                        </section>
                        <section class="card solid-card goals-section animate-group">
                            <div class="section-header"><h3>Monthly Budgets</h3></div>
                            <div id="budget-list" class="budget-list"></div>
                        </section>
                    </aside>

                    <section class="right-panel">
                        <div class="card solid-card history-section animate-group">
                            <div class="history-header">
                                <h3>Transactions</h3>
                                <div class="search-box"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="filter-text" placeholder="Search..."></div>
                            </div>
                            <ul id="transaction-list" class="transaction-list"></ul>
                        </div>
                    </section>
                </div>
            </div>

            <div id="analytics-view" class="view-container hidden" role="tabpanel">
                <div class="analytics-grid animate-group">
                    <div class="card solid-card">
                        <div class="chart-header"><h3>Expense Breakdown</h3></div>
                        <div class="chart-container" style="height: 300px;"><canvas id="expenseChart"></canvas></div>
                    </div>
                    <div class="card solid-card">
                        <div class="chart-header"><h3>Monthly Trend</h3></div>
                        <div class="chart-container" style="height: 300px;"><canvas id="trendChart"></canvas></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="export-modal" class="modal-overlay hidden" role="dialog">
        <div class="modal-content solid-card">
            <h3>Export Data</h3>
            <p class="text-muted mt-2 mb-4">Choose format to export.</p>
            <select id="export-format" class="mb-4" style="width:100%; padding: 0.8rem; border: 1px solid var(--border-light); border-radius: 8px; background: var(--bg-base); color: var(--text-main);">
                <option value="csv">CSV</option>
                <option value="json">JSON</option>
            </select>
            <div class="modal-actions">
                <button class="btn btn-secondary modal-close-btn">Cancel</button>
                <button id="confirm-export-btn" class="btn btn-primary">Download</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script>
        /**
         * ==========================================================================
         * 1. CONFIGURATION & UTILITIES
         * ==========================================================================
         */
        const CONFIG = {
            THRESHOLDS: { warning: 80, danger: 100 },
            BUDGETS: { food: 5000, transport: 3000, bills: 4000, shopping: 2000, entertainment: 2000 },
            CATEGORIES: {
                expense: [
                    { id: 'food', icon: '🍔', label: 'Food & Dining' },
                    { id: 'transport', icon: '🚗', label: 'Transport' },
                    { id: 'bills', icon: '💡', label: 'Bills & Utilities' },
                    { id: 'shopping', icon: '🛍️', label: 'Shopping' },
                    { id: 'entertainment', icon: '🎬', label: 'Entertainment' }
                ],
                income: [
                    { id: 'salary', icon: '💰', label: 'Salary' },
                    { id: 'freelance', icon: '💻', label: 'Freelance' }
                ]
            }
        };

        const ErrorBoundary = (fn, fallbackMsg = "An error occurred") => {
            return (...args) => {
                try {
                    return fn(...args);
                } catch (error) {
                    console.error("[FinanceOS Error]:", error);
                    ToastService.show(fallbackMsg, 'error');
                }
            };
        };

        const debounce = (func, delay) => {
            let timer;
            return (...args) => { clearTimeout(timer); timer = setTimeout(() => func(...args), delay); };
        };

        /**
         * ==========================================================================
         * 2. CORE SERVICES
         * ==========================================================================
         */
        const StorageService = {
            get: (key, fallback) => JSON.parse(localStorage.getItem(key)) || fallback,
            set: (key, value) => localStorage.setItem(key, JSON.stringify(value))
        };

        const ToastService = {
            container: document.getElementById('toast-container'),
            show(message, type = 'success', actionConfig = null) {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                const icon = type === 'success' ? 'check-circle' : type === 'error' ? 'circle-exclamation' : 'bell';
                
                let actionHTML = '';
                if (actionConfig) {
                    actionHTML = `<button class="toast-action" id="toast-btn-${actionConfig.id}">${actionConfig.label}</button>`;
                }

                toast.innerHTML = `<i class="fa-solid fa-${icon}"></i> <span>${message}</span> ${actionHTML}`;
                this.container.appendChild(toast);

                if (actionConfig) {
                    document.getElementById(`toast-btn-${actionConfig.id}`).addEventListener('click', () => {
                        actionConfig.onClick();
                        toast.remove();
                    });
                }

                setTimeout(() => {
                    toast.style.opacity = 0;
                    setTimeout(() => toast.remove(), 300);
                }, 4000);
            }
        };

        const ModalService = {
            activeModal: null,
            init() {
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && this.activeModal) this.close();
                });
                document.querySelectorAll('.modal-close-btn').forEach(btn => {
                    btn.addEventListener('click', () => this.close());
                });
            },
            open(modalId) {
                this.activeModal = document.getElementById(modalId);
                if(!this.activeModal) return;
                this.activeModal.classList.remove('hidden');
                setTimeout(() => this.activeModal.classList.add('visible'), 10);
            },
            close() {
                if (!this.activeModal) return;
                this.activeModal.classList.remove('visible');
                setTimeout(() => {
                    this.activeModal.classList.add('hidden');
                    this.activeModal = null;
                }, 200);
            }
        };

        /**
         * ==========================================================================
         * 3. STATE MACHINE (Mini-Redux)
         * ==========================================================================
         */
        const Store = {
            state: {
                transactions: StorageService.get('fin_data', []),
                theme: StorageService.get('fin_theme', 'light'),
                activeView: StorageService.get('fin_view', 'dashboard-view'),
                dateFilter: 'month',
                searchQuery: '',
                deletedCache: null,
                warnedBudgets: new Set()
            },
            
            dispatch: ErrorBoundary((action, payload) => {
                let newState = { ...Store.state };

                switch (action) {
                    case 'ADD_TX':
                        newState.transactions = [...newState.transactions, payload];
                        break;
                    case 'DELETE_TX':
                        newState.deletedCache = newState.transactions.find(t => t.id === payload);
                        newState.transactions = newState.transactions.filter(t => t.id !== payload);
                        break;
                    case 'UNDO_DELETE':
                        if (newState.deletedCache) {
                            newState.transactions = [...newState.transactions, newState.deletedCache];
                            newState.deletedCache = null;
                        }
                        break;
                    case 'SET_THEME': newState.theme = payload; break;
                    case 'SET_VIEW': newState.activeView = payload; break;
                    case 'SET_FILTER': newState.dateFilter = payload; break;
                    case 'SET_SEARCH': newState.searchQuery = payload; break;
                    default: throw new Error("Unknown action type");
                }

                Store.state = newState;
                Store.persist();
                App.render();
            }, "State update failed"),

            persist() {
                StorageService.set('fin_data', this.state.transactions);
                StorageService.set('fin_theme', this.state.theme);
                StorageService.set('fin_view', this.state.activeView);
            },

            getFilteredData() {
                let data = [...this.state.transactions];
                
                // Date Filter
                const now = new Date();
                data = data.filter(t => {
                    if (this.state.dateFilter === 'all') return true;
                    const tDate = new Date(t.date);
                    return tDate.getMonth() === now.getMonth() && tDate.getFullYear() === now.getFullYear();
                });

                // Search Filter
                if (this.state.searchQuery) {
                    const q = this.state.searchQuery.toLowerCase();
                    data = data.filter(t => t.description.toLowerCase().includes(q) || t.category.toLowerCase().includes(q));
                }

                return data.sort((a, b) => new Date(b.date) - new Date(a.date));
            }
        };

        /**
         * ==========================================================================
         * 4. DOM RENDERERS & DATA VISUALIZATION
         * ==========================================================================
         */
        const DOM = {
            pieChart: null,
            trendChart: null,

            initUI() {
                document.documentElement.setAttribute('data-theme', Store.state.theme);
                document.getElementById('global-date-filter').value = Store.state.dateFilter;
                
                const typeSelect = document.getElementById('type');
                const catSelect = document.getElementById('category');
                
                typeSelect.addEventListener('change', (e) => {
                    catSelect.innerHTML = '';
                    CONFIG.CATEGORIES[e.target.value].forEach(cat => catSelect.add(new Option(cat.label, cat.id)));
                });
                typeSelect.dispatchEvent(new Event('change'));
            },

            renderTransactions: ErrorBoundary((transactions) => {
                const list = document.getElementById('transaction-list');
                list.innerHTML = '';
                
                if (!transactions.length) {
                    list.innerHTML = `<div class="empty-state-container" style="padding: 2rem; text-align: center; color: var(--text-muted);"><i class="fa-solid fa-receipt" style="font-size: 2rem; margin-bottom: 1rem; opacity: 0.5;"></i><p>No transactions found.</p></div>`;
                    return;
                }

                transactions.forEach((t, index) => {
                    const isInc = t.type === 'income';
                    const cat = CONFIG.CATEGORIES[t.type].find(c => c.id === t.category);
                    const li = document.createElement('li');
                    li.className = `transaction-item list-enter`;
                    li.style.animationDelay = `${(index % 10) * 30}ms`; 
                    
                    li.innerHTML = `
                        <div class="trans-left">
                            <div class="cat-icon" style="background: ${isInc ? 'rgba(16,185,129,0.1)' : 'rgba(239,68,68,0.1)'}; color: ${isInc ? 'var(--success)' : 'var(--danger)'}">
                                ${cat ? cat.icon : '📝'}
                            </div>
                            <div class="trans-details">
                                <strong>${t.description}</strong><span class="trans-meta">${t.date}</span>
                            </div>
                        </div>
                        <div class="trans-right">
                            <div class="trans-amount ${isInc ? 'text-success' : 'text-danger'}">${isInc ? '+' : '-'}₹${t.amount.toLocaleString()}</div>
                            <button class="action-btn delete-btn" data-id="${t.id}"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    `;
                    list.appendChild(li);
                });
            }),

            renderBudgets: ErrorBoundary((transactions) => {
                const list = document.getElementById('budget-list');
                list.innerHTML = '';
                
                const expenses = transactions.filter(t => t.type === 'expense');
                const spent = expenses.reduce((acc, t) => { acc[t.category] = (acc[t.category] || 0) + t.amount; return acc; }, {});

                Object.keys(CONFIG.BUDGETS).forEach(catId => {
                    const limit = CONFIG.BUDGETS[catId];
                    const currentSpent = spent[catId] || 0;
                    const percentage = Math.min((currentSpent / limit) * 100, 100);
                    const conf = CONFIG.CATEGORIES.expense.find(c => c.id === catId);
                    
                    let status = 'normal';
                    if (percentage >= CONFIG.THRESHOLDS.danger) {
                        status = 'danger';
                        if (!Store.state.warnedBudgets.has(catId) && currentSpent > 0) {
                            ToastService.show(`Budget Exceeded: ${conf.label}`, 'error');
                            Store.state.warnedBudgets.add(catId);
                        }
                    } else if (percentage >= CONFIG.THRESHOLDS.warning) {
                        status = 'warning';
                    }

                    list.innerHTML += `
                        <div class="budget-item">
                            <div class="budget-info"><span>${conf ? conf.label : catId}</span><span>₹${currentSpent.toLocaleString()} / ₹${limit.toLocaleString()}</span></div>
                            <div class="budget-bar-bg"><div class="budget-bar-fill ${status}" style="width: ${percentage}%"></div></div>
                        </div>
                    `;
                });
            }),

            renderCharts: ErrorBoundary((transactions) => {
                if (Store.state.activeView !== 'analytics-view') return;
                
                const expenses = transactions.filter(t => t.type === 'expense');
                
                // 1. Pie Chart
                const catTotals = expenses.reduce((acc, t) => { 
                    const label = CONFIG.CATEGORIES.expense.find(c => c.id === t.category)?.label || t.category;
                    acc[label] = (acc[label] || 0) + t.amount; 
                    return acc; 
                }, {});
                
                if (DOM.pieChart) DOM.pieChart.destroy();
                DOM.pieChart = new Chart(document.getElementById('expenseChart'), {
                    type: 'doughnut',
                    data: { 
                        labels: Object.keys(catTotals).length ? Object.keys(catTotals) : ['No Data'], 
                        datasets: [{ 
                            data: Object.values(catTotals).length ? Object.values(catTotals) : [1], 
                            backgroundColor: Object.keys(catTotals).length ? ['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'] : ['#e2e8f0'],
                            borderWidth: 0
                        }] 
                    },
                    options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
                });

                // 2. Trend Line Chart
                const recentExpenses = expenses.slice(0, 7).reverse();
                const dates = recentExpenses.map(t => t.date.split('-').slice(1).join('/'));
                const amounts = recentExpenses.map(t => t.amount);
                
                if (DOM.trendChart) DOM.trendChart.destroy();
                DOM.trendChart = new Chart(document.getElementById('trendChart'), {
                    type: 'line',
                    data: { 
                        labels: dates.length ? dates : ['No Data'], 
                        datasets: [{ 
                            label: 'Daily Expense', 
                            data: amounts.length ? amounts : [0], 
                            borderColor: '#ef4444', 
                            backgroundColor: 'rgba(239, 68, 68, 0.1)',
                            tension: 0.4,
                            fill: true
                        }] 
                    },
                    options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
                });
            })
        };

        /**
         * ==========================================================================
         * 5. APPLICATION BOOTSTRAP & CONTROLLER
         * ==========================================================================
         */
        const App = {
            init() {
                setTimeout(() => {
                    const loader = document.getElementById('app-loader');
                    const root = document.getElementById('app-root');
                    if(loader) loader.style.opacity = '0';
                    setTimeout(() => {
                        if(loader) loader.style.display = 'none';
                        if(root) {
                            root.style.opacity = '1';
                            root.style.transition = 'opacity 0.5s ease';
                        }
                    }, 500);
                }, 800);

                ModalService.init();
                DOM.initUI();
                this.bindEvents();
                
                document.getElementById('date').valueAsDate = new Date();
                this.switchView(Store.state.activeView);
                this.render();
            },

            render: ErrorBoundary(() => {
                const data = Store.getFilteredData();
                
                const inc = data.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
                const exp = data.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);

                document.getElementById('balance-amount').innerText = `₹${(inc - exp).toLocaleString('en-IN')}`;
                document.getElementById('income-amount').innerText = `₹${inc.toLocaleString('en-IN')}`;
                document.getElementById('expense-amount').innerText = `₹${exp.toLocaleString('en-IN')}`;

                DOM.renderTransactions(data);
                DOM.renderBudgets(data);
                DOM.renderCharts(data);
            }),

            switchView(targetId) {
                document.querySelectorAll('.view-container').forEach(v => {
                    v.classList.remove('active');
                    v.classList.add('hidden');
                });
                document.querySelectorAll('.tab-btn').forEach(b => {
                    b.classList.toggle('active', b.dataset.target === targetId);
                });
                
                const view = document.getElementById(targetId);
                view.classList.remove('hidden');
                setTimeout(() => {
                    view.classList.add('active');
                    if (targetId === 'analytics-view') App.render(); 
                }, 10);
                
                Store.dispatch('SET_VIEW', targetId);
            },

            handleExport() {
                const format = document.getElementById('export-format').value;
                const data = Store.getFilteredData();
                if(!data.length) return ToastService.show('No data to export', 'error');

                let content, mime, ext;
                if (format === 'json') {
                    content = JSON.stringify(data, null, 2);
                    mime = 'application/json';
                    ext = 'json';
                } else {
                    const headers = 'Date,Type,Category,Description,Amount\n';
                    content = headers + data.map(t => `${t.date},${t.type},${t.category},"${t.description}",${t.amount}`).join('\n');
                    mime = 'text/csv';
                    ext = 'csv';
                }

                const blob = new Blob([content], { type: mime });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `FinanceOS_Export_${new Date().toISOString().split('T')[0]}.${ext}`;
                link.click();
                
                ModalService.close();
                ToastService.show('Export successful!');
            },

            bindEvents() {
                document.getElementById('transaction-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const amount = parseFloat(document.getElementById('amount').value);
                    if (amount <= 0) return ToastService.show('Amount must be positive', 'error');

                    Store.dispatch('ADD_TX', {
                        id: Date.now(),
                        type: document.getElementById('type').value,
                        category: document.getElementById('category').value,
                        amount: amount,
                        date: document.getElementById('date').value,
                        description: document.getElementById('desc').value.trim()
                    });
                    
                    e.target.reset();
                    document.getElementById('date').valueAsDate = new Date();
                    ToastService.show('Transaction Saved');
                });

                document.getElementById('transaction-list').addEventListener('click', (e) => {
                    const delBtn = e.target.closest('.delete-btn');
                    if (delBtn) {
                        const id = Number(delBtn.dataset.id);
                        Store.dispatch('DELETE_TX', id);
                        ToastService.show('Record deleted', 'error', {
                            id: 'undo-btn', label: 'UNDO', onClick: () => Store.dispatch('UNDO_DELETE')
                        });
                    }
                });

                document.getElementById('filter-text').addEventListener('input', debounce((e) => {
                    Store.dispatch('SET_SEARCH', e.target.value);
                }, 300));

                document.getElementById('global-date-filter').addEventListener('change', (e) => {
                    Store.dispatch('SET_FILTER', e.target.value);
                });

                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => this.switchView(e.target.dataset.target));
                });

                document.getElementById('theme-toggle').addEventListener('click', () => {
                    const newTheme = Store.state.theme === 'light' ? 'dark' : 'light';
                    Store.dispatch('SET_THEME', newTheme);
                    document.documentElement.setAttribute('data-theme', newTheme);
                    if (DOM.pieChart) App.render(); 
                });

                document.getElementById('open-export-btn').addEventListener('click', () => ModalService.open('export-modal'));
                document.getElementById('confirm-export-btn').addEventListener('click', () => this.handleExport());
            }
        };

        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
